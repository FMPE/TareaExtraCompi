<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d6efd" />
    <meta
      name="description"
      content="Analizadores sintácticos: LR(0), SLR, LALR, LR(1), LL(1), descenso recursivo. PWA."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fuentes (Inter + JetBrains Mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Aplicar tema antes del primer paint para evitar FOUC -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('parserlab-theme');
          if (saved !== 'light' && saved !== 'dark') {
            saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = saved;
        } catch (_) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>

    <title>ParserLab — Analizadores sintácticos</title>
  </head>
  <body>
    <noscript>Esta aplicación requiere JavaScript habilitado.</noscript>
    <div id="root"></div>

  </body>
</html>
